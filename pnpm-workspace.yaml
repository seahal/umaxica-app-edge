packages:
  - app/apex
  - app/core
  - com/apex
  - com/core
  - org/apex
  - org/core
  - dev/core
  - net/apex

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.12
  vite-plus: ^0.1.12
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.12

ignoredBuiltDependencies:
  - esbuild
  - sharp
  - workerd

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - vite-plus
  - '@voidzero-dev/*'
  - oxlint
  - '@oxlint/*'
  - oxfmt
  - '@oxfmt/*'

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
  undici: '>=7.24.0'
  fast-xml-parser: '>=5.5.7'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
