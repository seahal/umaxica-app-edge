name: 'edge'
services:
  core:
    build:
      context: .
      args:
        - DOCKER_UID=${UID:-1000}
        - DOCKER_GID=${GID:-1000}
        - DOCKER_USER=edge
        - DOCKER_GROUP=group
    working_dir: /home/edge/workspace
    volumes:
      - type: bind
        source: .
        target: /home/edge/workspace
        consistency: cached
      - type: volume
        source: node-volume
        target: /home/edge/workspace/node_modules
        volume:
          nocopy: true
    ports:
      # Hono apex
      - '5101:5101' # com/apex
      - '5201:5201' # net/apex
      - '5301:5301' # org/apex
      - '5401:5401' # app/apex
      # Next.js core
      - '5170:5170' # com/core
      - '5171:5171' # app/core
      - '5172:5172' # org/core
      # Next.js docs
      - '5174:5174' # app/docs
      - '5177:5177' # com/docs
      - '5180:5180' # org/docs
      # Next.js help
      - '5175:5175' # app/help
      - '5178:5178' # com/help
      - '5181:5181' # org/help
      # Next.js news
      - '5176:5176' # app/news
      - '5179:5179' # com/news
      - '5182:5182' # org/news
    command: sleep infinity
    tty: true
    stdin_open: true
    init: true
    user: edge:group
    environment:
      - CLOUDFLARE_ENV=development
      - VITE_GIT_HOOKS=0
      - NODE_OPTIONS=--max-old-space-size=4096
      - HTTP_PROXY
      - HTTPS_PROXY
      - NO_PROXY
      - ALL_PROXY
      - http_proxy
      - https_proxy
      - no_proxy
      - all_proxy
    restart: unless-stopped
    networks:
      outer:
        aliases:
          - edge
networks:
  outer:
    external: true
volumes:
  node-volume:
    driver: local
