pre-commit:
  parallel: true
  commands:
    format:
      run: vp run format
      stage_fixed: true
      glob: '*.{js,jsx,ts,tsx,json,jsonc,yaml,yml,toml,md,mdx,css,scss,graphql}'
    lint:
      run: vp run lint
      stage_fixed: true
      glob: '*.{js,jsx,ts,tsx}'
    check:
      run: vp check
      glob: '*.{ts,tsx}'
    audit:
      run: vp pm audit
      skip:
        - merge
        - rebase
    secret-scan:
      run: gitleaks protect
      skip:
        - merge
        - rebase
    test:
      run: vp test
    apex-build:
      run: vp run build:apex:check
    outdated:
      run: vp outdated
