name: CI
on:
  push:
    branches:
      - main
      - develop
  pull_request:
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  audit:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp pm audit -- --audit-level=high

  outdated:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp outdated || true

  knip:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp dlx knip --include unlisted,unresolved,binaries
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

  secret-scan:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp check

  test:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp test --coverage

  build-vite:
    runs-on: ubuntu-slim
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target:
          - app/apex
          - app/core
          - com/apex
          - com/core
          - dev/core
          - net/apex
          - org/apex
          - org/core
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp run --filter ./${{ matrix.target }} build
      - name: Report asset sizes
        run: |
          case "${{ matrix.target }}" in
            */apex) asset_dir="${{ matrix.target }}/dist/client" ;;
            *) asset_dir="${{ matrix.target }}/build/client" ;;
          esac

          if [[ ! -d "$asset_dir" ]]; then
            echo "Asset directory not found: $asset_dir" >&2
            exit 1
          fi

          echo "Asset directory: $asset_dir"
          find "$asset_dir" -type f \( -name '*.js' -o -name '*.css' \) -printf '%P\t%s bytes\n' | sort
