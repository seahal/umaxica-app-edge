name: CI
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  audit:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install
      - run: vp pm audit -- --audit-level=high

  outdated:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install
      - run: vp outdated || true

  knip:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install
      - run: vp dlx knip --include unlisted,unresolved,binaries
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

  secret-scan:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install
      - run: vp check

  test:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install
      - run: vp test --coverage

  build-vite:
    runs-on: ubuntu-slim
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target:
          - app/apex
          - app/core
          - app/docs
          - app/help
          - app/news
          - com/apex
          - com/core
          - com/docs
          - com/help
          - com/news
          - dev/core
          - net/apex
          - org/apex
          - org/core
          - org/docs
          - org/help
          - org/news
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install
      - run: vp run --filter ./$TARGET build
        env:
          TARGET: ${{ matrix.target }}
      - name: Report asset sizes
        env:
          TARGET: ${{ matrix.target }}
        run: |
          case "$TARGET" in
            */apex) asset_dir="$TARGET/dist/client" ;;
            dev/core) asset_dir="" ;;
            *) asset_dir="$TARGET/.open-next/assets" ;;
          esac

          if [[ -z "$asset_dir" ]]; then
            echo "No asset directory for $TARGET (skipped)"
            exit 0
          fi

          if [[ ! -d "$asset_dir" ]]; then
            echo "Asset directory not found: $asset_dir" >&2
            exit 1
          fi

          echo "Asset directory: $asset_dir"
          find "$asset_dir" -type f \( -name '*.js' -o -name '*.css' \) -printf '%P\t%s bytes\n' | sort
      - name: Validate deployment (wrangler dry-run)
        if: matrix.target != 'dev/core'
        working-directory: ${{ matrix.target }}
        run: vp exec wrangler deploy --dry-run --outdir .wrangler/dry-run
