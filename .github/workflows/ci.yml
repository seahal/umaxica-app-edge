name: CI

on:
  push:
    branches: [develop, 'main']
  pull_request:
    branches: [develop, 'main']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '25'
          cache: true
      - run: vp install
      - run: vp check
      - run: vp test
      - run: vp run build:apex:check
