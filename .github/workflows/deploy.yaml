name: Deploy
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
defaults:
  run:
    shell: bash
permissions:
  contents: read
jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-slim
    timeout-minutes: 30
    concurrency:
      group: deploy-${{ matrix.target }}-${{ github.event.workflow_run.head_sha }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        target:
          - app/apex
          - app/core
          - app/docs
          - app/help
          - app/news
          - com/apex
          - com/core
          - com/docs
          - com/help
          - com/news
          - net/apex
          - org/apex
          - org/core
          - org/docs
          - org/help
          - org/news
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install
      - name: Deploy to Cloudflare Workers
        run: vp run --filter ./$TARGET deploy
        env:
          TARGET: ${{ matrix.target }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
